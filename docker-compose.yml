version: '3.8'

networks:
  sfmc-network:
    driver: bridge

volumes:
  sfmc_mysql_data:
  sfmc_rabbitmq_data:

services:

  # ─── Infrastructure ───────────────────────────────────────────────────────

  mysql:
    image: mysql:8.0
    container_name: sfmc-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_ROOT_HOST: "%" 
    ports:
      - "3306:3306"
    volumes:
      - sfmc_mysql_data:/var/lib/mysql
    networks:
      - sfmc-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: sfmc-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - sfmc_rabbitmq_data:/var/lib/rabbitmq
    networks:
      - sfmc-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Service Discovery ────────────────────────────────────────────────────

  discovery-server:
    build:
      context: ./discovery-server
    container_name: sfmc-discovery-server
    ports:
      - "8761:8761"
    networks:
      - sfmc-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8761/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─── Auth Service ─────────────────────────────────────────────────────────

  auth-service:
    build:
      context: ./auth-service
    container_name: sfmc-auth-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - sfmc-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8081/oauth2/jwks || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─── Business Microservices ───────────────────────────────────────────────

  product-service:
    build:
      context: ./product-service
    container_name: sfmc-product-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/product_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka
      SERVER_ERROR_INCLUDE_MESSAGE: always
      SERVER_ERROR_INCLUDE_BINDING_ERRORS: always
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - sfmc-network

  inventory-service:
    build:
      context: ./inventory-service
    container_name: sfmc-inventory-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/inventory_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka
      SPRING_RABBITMQ_HOST: rabbitmq
      SERVER_ERROR_INCLUDE_MESSAGE: always
      SERVER_ERROR_INCLUDE_BINDING_ERRORS: always
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - sfmc-network

  order-service:
    build:
      context: ./order-service
    container_name: sfmc-order-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/order_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka
      SPRING_RABBITMQ_HOST: rabbitmq
      SERVER_ERROR_INCLUDE_MESSAGE: always
      SERVER_ERROR_INCLUDE_BINDING_ERRORS: always
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - sfmc-network

  billing-service:
    build:
      context: ./billing-service
    container_name: sfmc-billing-service
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/billing_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka
      SPRING_RABBITMQ_HOST: rabbitmq
      SERVER_ERROR_INCLUDE_MESSAGE: always
      SERVER_ERROR_INCLUDE_BINDING_ERRORS: always
      FEDAPAY_SECRET_KEY: sk_sandbox_TrSFDdSZXLibsmlKJNuZSYe_
      FEDAPAY_API_URL: https://sandbox-api.fedapay.com/v1
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - sfmc-network

  production-service:
    build:
      context: ./production-service
    container_name: sfmc-production-service
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/production_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka
      SPRING_RABBITMQ_HOST: rabbitmq
      SERVER_ERROR_INCLUDE_MESSAGE: always
      SERVER_ERROR_INCLUDE_BINDING_ERRORS: always
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - sfmc-network

  user-service:
    build:
      context: ./user-service
    container_name: sfmc-user-service
    ports:
      - "8087:8087"
    environment:
      SERVER_PORT: 8087
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/user_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "true"
      EUREKA_CLIENT_FETCH_REGISTRY: "true"
      SERVER_ERROR_INCLUDE_MESSAGE: always
      SERVER_ERROR_INCLUDE_BINDING_ERRORS: always
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - sfmc-network

  notification-service:
    build:
      context: ./notification-service
    container_name: sfmc-notification-service
    ports:
      - "8088:8088"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/notification_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka
      SERVER_ERROR_INCLUDE_MESSAGE: always
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - sfmc-network

  # ─── API Gateway ──────────────────────────────────────────────────────────

  api-gateway:
    build:
      context: ./api-gateway
    container_name: sfmc-api-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://auth-service:8081/oauth2/jwks
    depends_on:
      discovery-server:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    networks:
      - sfmc-network

  # ─── Frontend ─────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
    container_name: sfmc-main-frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - sfmc-network
